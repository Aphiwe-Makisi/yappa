@let users = users$ | async;
<div class="container">
  <div class="header flex-row">
    <span class="title flex-row">
      <p-button icon="pi pi-arrow-left" (onClick)="back()" [rounded]="true" severity="secondary" />
      <div class="icon-wrapper">
        <i class="pi pi-comment" style="font-size: 2rem"></i>
      </div>
      <h2>New Chat</h2>
    </span>
    <div class="action-buttons">
      <p-button icon="pi pi-sign-out" [rounded]="true" [text]="true" severity="danger" />
    </div>
  </div>

  @for (user of users; track user.uid) {
    <div class="flex-row friend-wrapper" (click)="openOrCreateNewConversation(user.uid)">
      <app-avatar [userProfile]="user"></app-avatar>
      <div class="main-content flex-column">
        <p>{{ user.displayName }}</p>
        <small class="online-status">{{
          user.isOnline ? 'Online' : 'Last seen: ' + (user.lastSeen | firestoreDate | date: 'HH:mm')
        }}</small>
      </div>
    </div>
  }
</div>
