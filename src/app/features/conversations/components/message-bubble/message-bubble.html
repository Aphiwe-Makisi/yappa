@if (message(); as msg) {
  @if (conversation(); as conv) {
    <div
      class="container flex-column"
      [ngClass]="msg.senderId === conv.otherUser?.uid ? 'incoming-message' : 'outgoing-message'"
    >
      <span>{{ msg.text }}</span>
      <div class="msg-metadata flex-row">
        <small class="message-status">.</small>
        <small>{{ msg.createdAt | firestoreDate | date: 'HH:mm' }}</small>
      </div>
    </div>
  }
}
