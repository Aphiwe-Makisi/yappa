<div class="chat-item flex-row">
  <app-avatar [conversation]="conversation"></app-avatar>
  <div class="main-content flex-column">
    <strong class="display-name">{{ conversation.displayName }}</strong>
    <div class="last-message-wrapper">
      <i class="pi pi-clock"></i>
      <small class="last-message">This is the last message received in this conversation</small>
    </div>
  </div>
  <span class="meta-data flex-column">
    <small>{{ conversation.lastMessageTime }}</small>
    <small class="message-count" [ngClass]="conversation.unreadCount ? 'show' : 'hide'">{{
      conversation.unreadCount
    }}</small>
  </span>
</div>
