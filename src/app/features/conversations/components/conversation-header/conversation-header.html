<div class="header flex-row">
  <p-button icon="pi pi-arrow-left" [rounded]="true" [text]="true" (onClick)="back()" />
  @if (conv) {
    <app-avatar [conversation]="conv"></app-avatar>
    <div class="flex-column user-details">
      <h4>{{ conv.otherUser?.displayName }}</h4>
      <small>{{
        conv.otherUser?.isOnline ? 'Online' : 'Last seen: ' + (conv.otherUser?.lastSeen | chatDate)
      }}</small>
    </div>
  } @else {
    <p>Loading ...</p>
  }
</div>
